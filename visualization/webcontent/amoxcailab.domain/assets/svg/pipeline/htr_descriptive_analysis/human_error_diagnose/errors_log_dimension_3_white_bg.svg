<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="900" rx="15" fill="#ffffff" stroke="#cccccc" stroke-width="3" />
  
  <rect x="0" y="0" width="1200" height="80" rx="15" fill="#f0f0f0" stroke="#cccccc" stroke-width="2" />
  <text x="600" y="48" font-family="Courier New, monospace" font-size="28" fill="#b58900" font-weight="bold" text-anchor="middle">
    DIMENSION 3: SEMANTIC IMPACT AND CATEGORIZATION
  </text>

  <!-- LEFT COLUMN -->
  <g transform="translate(40, 130)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#666666" font-weight="bold">
      1. GRAMMATICAL CATEGORY
    </text>
    <rect width="350" height="380" rx="8" fill="#f7f7f7" stroke="#268bd2" stroke-width="2.5" />
    
    <g transform="translate(25, 45)" font-family="Arial" font-size="18" fill="#000000">
      <g>
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <circle cx="11" cy="9" r="5" fill="#859900" />
        <text x="35" y="15">Noun</text>
      </g>

      <g transform="translate(0, 45)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Article</text>
      </g>

      <g transform="translate(0, 90)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Adjective</text>
      </g>

      <g transform="translate(0, 135)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Verb</text>
      </g>

      <g transform="translate(0, 180)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Adverb</text>
      </g>

      <g transform="translate(0, 225)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Preposition / Conjunction</text>
      </g>

      <g transform="translate(0, 270)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Pronoun</text>
      </g>
    </g>
  </g>

  <!-- MIDDLE COLUMN -->
  <g transform="translate(425, 130)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#666666" font-weight="bold">
      2. ENTITY / CRITICAL VALUE
    </text>
    <rect width="350" height="380" rx="8" fill="#f7f7f7" stroke="#b58900" stroke-width="2.5" />

    <g transform="translate(25, 45)" font-family="Arial" font-size="18" fill="#000000">
      <g>
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Proper name</text>
      </g>

      <g transform="translate(0, 50)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Place (Toponym)</text>
      </g>

      <g transform="translate(0, 100)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <circle cx="11" cy="9" r="5" fill="#859900" />
        <text x="35" y="15">Date / Century</text>
      </g>

      <g transform="translate(0, 150)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Abbreviation (Script)</text>
      </g>

      <g transform="translate(0, 200)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">Number / Quantity</text>
      </g>

      <g transform="translate(0, 250)">
        <circle cx="11" cy="9" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="35" y="15" fill="#666666">None (Common lexicon)</text>
      </g>
    </g>
  </g>

  <!-- RIGHT COLUMN -->
  <g transform="translate(810, 130)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#666666" font-weight="bold">
      3. ERROR SEVERITY
    </text>
    <rect width="350" height="380" rx="8" fill="#f7f7f7" stroke="#dc322f" stroke-width="2.5" />

    <g transform="translate(25, 45)" font-family="Arial" font-size="18">
      <g>
        <rect width="300" height="70" rx="5" fill="#859900" fill-opacity="0.2" stroke="#859900" stroke-width="1" />
        <circle cx="20" cy="30" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <circle cx="20" cy="30" r="5" fill="#859900" />
        <text x="45" y="35" font-weight="bold">LOW</text>
        <text x="45" y="58" font-size="14" fill="#666666">Readable from context.</text>
      </g>

      <g transform="translate(0, 85)">
        <rect width="300" height="70" rx="5" fill="#b58900" fill-opacity="0.1" stroke="#b58900" stroke-width="1" />
        <circle cx="20" cy="30" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="45" y="35" font-weight="bold" fill="#b58900">MODERATE</text>
        <text x="45" y="58" font-size="14" fill="#666666">Impairs readability.</text>
      </g>

      <g transform="translate(0, 170)">
        <rect width="300" height="70" rx="5" fill="#dc322f" fill-opacity="0.1" stroke="#dc322f" stroke-width="1" />
        <circle cx="20" cy="30" r="9" fill="none" stroke="#000000" stroke-width="2" />
        <text x="45" y="35" font-weight="bold" fill="#dc322f">CRITICAL</text>
        <text x="45" y="58" font-size="14" fill="#666666">Alters historical meaning.</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM -->
  <g transform="translate(40, 550)">
    <rect x="-10" y="-15" width="1140" height="350" rx="15" fill="#f9f9f9" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="8,4" />
    <text x="0" y="25" font-family="Arial" font-size="22" fill="#b58900" font-weight="bold">
      SEMANTIC PRIORITIZATION MATRIX
    </text>

    <g transform="translate(0, 60)">
      <rect width="1117" height="120" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2" />
      <text x="20" y="35" font-family="Arial" font-size="18" fill="#268bd2" font-weight="bold">WHY CATEGORIZE?</text>
      <text x="20" y="73" font-family="Arial" font-size="18">• Nouns and verbs are usually the core information units.</text>
      <text x="20" y="103" font-family="Arial" font-size="18">• Articles and prepositions help measure grammatical noise.</text>
    </g>

    <g transform="translate(0, 200)">
      <rect width="1117" height="120" rx="10" fill="#ffffff" stroke="#dc322f" stroke-width="2" />
      <text x="20" y="35" font-family="Arial" font-size="18" fill="#dc322f" font-weight="bold">CRITICAL ERROR IDENTIFICATION</text>
      <text x="20" y="72" font-family="Arial" font-size="18">• Errors in names or places prevent document indexing.</text>
      <text x="20" y="97" font-family="Arial" font-size="18">• Errors in dates or numbers invalidate historical data.</text>
    </g>
  </g>

</svg>