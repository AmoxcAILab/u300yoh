<svg width="1200" height="950" viewBox="0 0 1200 950" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="950" rx="15" fill="#282828" stroke="#665c54" stroke-width="3" />
  
  <rect x="0" y="0" width="1200" height="80" rx="15" fill="#3c3836" stroke="#665c54" stroke-width="2" />
  <text x="600" y="48" font-family="Courier New, monospace" font-size="28" fill="#fabd2f" font-weight="bold" text-anchor="middle">DIMENSIÓN 2: ANÁLISIS DE LA SEÑAL (HTR vs GT)</text>

  <g transform="translate(40, 130)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#a89984" font-weight="bold">COMPARACIONES POR PALABRA</text>
    <g>
      <rect width="350" height="85" rx="8" fill="#32302f" stroke="#458588" stroke-width="2.5" />
      <text x="15" y="28" font-family="Arial" font-size="14" fill="#83a598" font-weight="bold">OUTPUT (HTR)</text>
      <text x="15" y="65" font-family="Courier New" font-size="24" fill="#ebdbb2" font-weight="bold">unarios</text>
    </g>
    <g transform="translate(0, 105)">
      <rect width="350" height="85" rx="8" fill="#32302f" stroke="#b8bb26" stroke-width="2.5" />
      <text x="15" y="28" font-family="Arial" font-size="14" fill="#b8bb26" font-weight="bold">GROUND TRUTH (PALEOGRAFÍA)</text>
      <text x="15" y="65" font-family="Courier New" font-size="24" fill="#ebdbb2" font-weight="bold">un años</text>
    </g>
    <g transform="translate(0, 210)">
      <rect width="350" height="150" rx="8" fill="#32302f" stroke="#665c54" stroke-width="2" />
      <text x="15" y="28" font-family="Arial" font-size="14" fill="#a89984" font-weight="bold">DESCRIPCIÓN (word-level)</text>
      <text x="15" y="60" font-family="Arial" font-size="18" fill="#ebdbb2">No separó las palabras</text>
      <text x="15" y="87" font-family="Arial" font-size="18" fill="#ebdbb2">Confunde el grupo "ri" con "ñ".</text>
      <text x="15" y="114" font-family="Arial" font-size="18" fill="#ebdbb2">Afecta legibilidad.</text>
    </g>
  </g>

  <g transform="translate(425, 130)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#a89984" font-weight="bold">ORIGEN DEL ERROR (PERCIBIDO)</text>
    <rect width="350" height="360" rx="8" fill="#32302f" stroke="#fabd2f" stroke-width="2.5" />
    <g transform="translate(25, 55)" font-family="Arial" font-size="19" fill="#ebdbb2">
      <g>
        <circle cx="11" cy="11" r="11" fill="none" stroke="#ebdbb2" stroke-width="2" />
        <text x="45" y="18">1. Layout (Segmentación)</text>
      </g>
      <g transform="translate(0, 70)">
        <circle cx="11" cy="11" r="11" fill="none" stroke="#ebdbb2" stroke-width="2" />
        <text x="45" y="18">2. Extracción CNN (Visual)</text>
      </g>
      <g transform="translate(0, 140)">
        <circle cx="11" cy="11" r="11" fill="none" stroke="#ebdbb2" stroke-width="2" />
        <path d="M5 11 L9 15 L17 7" fill="none" stroke="#b8bb26" stroke-width="3" />
        <text x="45" y="18">3. Secuenciación RNN (Lógica)</text>
      </g>
      <g transform="translate(0, 210)">
        <circle cx="11" cy="11" r="11" fill="none" stroke="#ebdbb2" stroke-width="2" />
        <text x="45" y="18">4. Decoding CTC (Limpieza)</text>
      </g>
    </g>
  </g>

  <g transform="translate(810, 130)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#a89984" font-weight="bold">OPERACIONES character-level (HTR:GT)</text>
    <g>
      <rect width="350" height="105" rx="8" fill="#32302f" stroke="#fb4934" stroke-width="2.5" />
      <text x="15" y="28" font-family="Arial" font-size="14" fill="#fb4934" font-weight="bold">INSERCIÓN (I)</text>
      <text x="15" y="65" font-family="Courier New" font-size="22" fill="#ebdbb2"></text>
    </g>
    <g transform="translate(0, 125)">
      <rect width="350" height="105" rx="8" fill="#32302f" stroke="#fabd2f" stroke-width="2.5" />
      <text x="15" y="28" font-family="Arial" font-size="14" fill="#fabd2f" font-weight="bold">REEMPLAZO (R)</text>
      <text x="15" y="65" font-family="Courier New" font-size="22" fill="#ebdbb2">ri:ñ</text>
    </g>
    <g transform="translate(0, 250)">
      <rect width="350" height="110" rx="8" fill="#32302f" stroke="#d3869b" stroke-width="2.5" />
      <text x="15" y="28" font-family="Arial" font-size="14" fill="#d3869b" font-weight="bold">ELIMINACIÓN (E)</text>
      <text x="15" y="65" font-family="Courier New" font-size="22" fill="#ebdbb2">un:"_"</text>
    </g>
  </g>

  <g transform="translate(40, 530)">
    <rect x="-10" y="-15" width="1140" height="390" rx="15" fill="#32302f" stroke="#665c54" stroke-width="1.5" stroke-dasharray="8,4" />
    <text x="0" y="25" font-family="Arial" font-size="22" fill="#fabd2f" font-weight="bold">GUÍA DE DIAGNÓSTICO</text>
    
    <g transform="translate(0, 60)">
      <g>
        <rect width="540" height="140" rx="10" fill="#282828" stroke="#458588" stroke-width="2" />
        <text x="20" y="35" font-family="Arial" font-size="18" fill="#83a598" font-weight="bold">1. LAYOUT (SEGMENTACIÓN)</text>
        <text x="20" y="65" font-family="Arial" font-size="17" fill="#ebdbb2">• Lectura en orden incorrecto (salto de línea o columna).</text>
        <text x="20" y="90" font-family="Arial" font-size="17" fill="#ebdbb2">• Mezcla de renglones adyacentes en una sola salida.</text>
        <text x="20" y="115" font-family="Arial" font-size="17" fill="#ebdbb2">• Omisión de renglones, notas al margen o bloques aislados.</text>
      </g>
      <g transform="translate(570, 0)">
        <rect width="540" height="140" rx="10" fill="#282828" stroke="#b8bb26" stroke-width="2" />
        <text x="20" y="35" font-family="Arial" font-size="18" fill="#b8bb26" font-weight="bold">2. CNN (EXTRACCIÓN VISUAL)</text>
        <text x="20" y="65" font-family="Arial" font-size="17" fill="#ebdbb2">• Confusión por similitud física clara (ej: f/s larga, u/v corta).</text>
        <text x="20" y="90" font-family="Arial" font-size="17" fill="#ebdbb2">• Ignora tildes, signos de puntuación o rasgos finos.</text>
        <text x="20" y="115" font-family="Arial" font-size="17" fill="#ebdbb2">• Falla al reconocer abreviaturas.</text>
      </g>
    </g>

    <g transform="translate(0, 220)">
      <g>
        <rect width="540" height="140" rx="10" fill="#282828" stroke="#fabd2f" stroke-width="2" />
        <text x="20" y="35" font-family="Arial" font-size="18" fill="#fabd2f" font-weight="bold">3. RNN (SECUENCIA Y LÓGICA)</text>
        <text x="20" y="65" font-family="Arial" font-size="17" fill="#ebdbb2">• Unión de palabras (omisión de espacios gramaticales).</text>
        <text x="20" y="90" font-family="Arial" font-size="17" fill="#ebdbb2">• Inserción de letras para "completar" palabras comunes.</text>
        <text x="20" y="115" font-family="Arial" font-size="17" fill="#ebdbb2">• El error cambia el sentido gramatical o el contexto.</text>
      </g>
      <g transform="translate(570, 0)">
        <rect width="540" height="140" rx="10" fill="#282828" stroke="#d3869b" stroke-width="2" />
        <text x="20" y="35" font-family="Arial" font-size="18" fill="#d3869b" font-weight="bold">4. CTC (DECODING Y LIMPIEZA)</text>
        <text x="20" y="65" font-family="Arial" font-size="17" fill="#ebdbb2">• Caracteres repetidos (ej: caassa) o "tartamudeo" tipográfico.</text>
        <text x="20" y="90" font-family="Arial" font-size="17" fill="#ebdbb2">• Eliminación de caracteres claros en la imagen original.</text>
      </g>
    </g>
  </g>
</svg>