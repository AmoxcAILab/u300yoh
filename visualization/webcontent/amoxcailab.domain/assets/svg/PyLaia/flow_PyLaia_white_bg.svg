<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1400"
   height="750"
   viewBox="0 0 1400 750"
   xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect
     x="2"
     y="2"
     width="1396"
     height="746"
     rx="15"
     fill="#ffffff"
     stroke="#cccccc"
     stroke-width="3" />

  <!-- Title -->
  <text
     x="700"
     y="55"
     font-family="Courier New, monospace"
     font-size="26"
     fill="#000000"
     font-weight="bold"
     text-anchor="middle">
     PyLaia Processing Pipeline
  </text>

  <!-- 1. Layout Analysis -->
  <g transform="translate(50, 150)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#b58900" font-weight="bold">
      1. LAYOUT ANALYSIS
    </text>
    <rect width="220" height="150" fill="#f5f5f5" stroke="#b58900" stroke-width="2" rx="5"/>
    <g font-family="Arial" font-size="16" fill="#000000">
      <text x="20" y="45">Binarization / Cleaning</text>
      <text x="20" y="75">Baseline Detection</text>
      <text x="20" y="105">Normalization (128px)</text>
    </g>
  </g>

  <!-- Arrow -->
  <path d="M270 225 L380 225" stroke="#000000" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- 2. CNN -->
  <g transform="translate(380, 150)">
    <text x="-40" y="-15" font-family="Arial" font-size="18" fill="#268bd2" font-weight="bold">
      2. VISUAL FEATURE EXTRACTION (CNN)
    </text>
    <rect width="280" height="220" fill="#f5f5f5" stroke="#268bd2" stroke-width="2" rx="5"/>
    <text x="140" y="35" font-family="Arial" font-size="16" fill="#000000" text-anchor="middle">
      Convolutional Filters
    </text>

    <g transform="translate(40, 65)">
      <rect width="80" height="80" fill="#ffffff" stroke="#999999"/>
      <rect x="5" y="5" width="30" height="30" fill="#2aa198"/>
      <path d="M90 40 L120 40" stroke="#2aa198" stroke-width="2" marker-end="url(#arrow_green)"/>
      <rect x="130" y="25" width="30" height="30" fill="#2aa198" stroke="#859900"/>
      <text x="75" y="110" font-family="Arial" font-size="16" fill="#2aa198" text-anchor="middle">
        MAX POOLING
      </text>
    </g>
  </g>

  <!-- Arrow -->
  <path d="M660 260 L770 260" stroke="#000000" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- 3. RNN -->
  <g transform="translate(770, 150)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#dc322f" font-weight="bold">
      3. SEQUENCING (RNN)
    </text>
    <rect width="240" height="250" fill="#f5f5f5" stroke="#dc322f" stroke-width="2" rx="5"/>

    <path d="M30 80 L210 80" stroke="#dc322f" stroke-width="2.5" marker-end="url(#arrow_red)"/>
    <text x="120" y="60" font-family="Arial" font-size="16" fill="#dc322f" text-anchor="middle">
      Past context (L→R)
    </text>

    <path d="M210 140 L40 140" stroke="#dc322f" stroke-width="2.5" marker-end="url(#arrow_red)"/>
    <text x="120" y="120" font-family="Arial" font-size="16" fill="#dc322f" text-anchor="middle">
      Future context (R→L)
    </text>

    <rect x="40" y="180" width="160" height="40" fill="#ffffff" stroke="#000000"/>
    <text x="120" y="205" font-family="Arial" font-size="16" fill="#000000" text-anchor="middle">
      CONCATENATION
    </text>
  </g>

  <!-- Arrow -->
  <path d="M1010 275 L1120 275" stroke="#000000" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- 4. CTC -->
  <g transform="translate(1120, 150)">
    <text x="0" y="-15" font-family="Arial" font-size="18" fill="#859900" font-weight="bold">
      4. DECODING (CTC)
    </text>
    <rect width="230" height="320" fill="#f5f5f5" stroke="#859900" stroke-width="2" rx="5"/>

    <g transform="translate(35, 40)">
      <rect width="160" height="100" fill="#ffffff" stroke="#cccccc"/>
      <rect x="10" y="10" width="30" height="20" fill="#dc322f"/>
      <rect x="50" y="40" width="30" height="20" fill="#dc322f"/>
      <rect x="90" y="70" width="30" height="20" fill="#999999" opacity="0.6"/>
      <text x="80" y="125" font-family="Arial" font-size="16" fill="#555555" text-anchor="middle">
        Probability Matrix
      </text>
    </g>

    <text x="115" y="205" font-family="Arial" font-size="16" fill="#000000" text-anchor="middle">
      Decoding (Collapse)
    </text>

    <rect x="25" y="230" width="180" height="60" fill="#ffffff" stroke="#b58900" stroke-width="2"/>
    <text x="115" y="265" font-family="Courier New" font-size="20" fill="#000000" font-weight="bold" text-anchor="middle">
      fazer unarios
    </text>
  </g>

  <!-- Feedback -->
  <g>
    <path d="M1235 470 L1235 650 L520 650 L520 380"
          fill="none"
          stroke="#d33682"
          stroke-width="3"
          stroke-dasharray="8,4"
          marker-end="url(#arrow_up_pink)"/>
    <text x="870" y="640" font-family="Arial" font-size="16" fill="#d33682" font-weight="bold" text-anchor="middle">
      ERROR BACKPROPAGATION
    </text>
    <text x="870" y="670" font-family="Arial" font-size="18" fill="#555555" text-anchor="middle">
      Weight optimization (end-to-end training)
    </text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#000000"/>
    </marker>

    <marker id="arrow_red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc322f"/>
    </marker>

    <marker id="arrow_green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2aa198"/>
    </marker>

    <marker id="arrow_up_pink" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="0">
      <path d="M0,10 H10 L5,0 Z" fill="#d33682"/>
    </marker>
  </defs>

</svg>