<svg width="650" height="400" viewBox="0 0 650 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="2" y="2" width="646" height="396" rx="10" fill="#282828" stroke="#665c54" stroke-width="2" />
  
  <text x="40" y="45" font-family="Arial" font-size="18" fill="#ebdbb2" font-weight="bold">ANÁLISIS DE PROBABILIDAD: MEMORIA DE TRABAJO</text>

  <text x="40" y="85" font-family="Arial" font-size="14" fill="#a89984">El modelo guarda en memoria un historial de caracteres:</text>
  
  <g transform="translate(40, 175)">
    
    <rect x="0" y="0" width="160" height="50" fill="#3c3836" stroke="#b8bb26" stroke-width="2" />
    <text x="80" y="35" font-family="Courier New" font-size="28" fill="#ebdbb2" text-anchor="middle" font-weight="bold">... u n</text>
    
    <g fill="none" stroke="#fabd2f" stroke-width="2">
      <path d="M160 25 L240 25" />
      <path d="M240 25 L270 -20" /> <path d="M240 25 L270 70" />  </g>

    <g transform="translate(280, -50)">
      <rect width="180" height="60" fill="#32302f" stroke="#fe8019" stroke-width="2" rx="5" />
      <text x="90" y="25" font-family="Courier New" font-size="20" fill="#ebdbb2" text-anchor="middle">_ a ñ o s</text>
      <text x="90" y="45" font-family="Arial" font-size="10" fill="#fb4934" text-anchor="middle">Baja prob. (Gramática)</text>
    </g>

    <g transform="translate(280, 40)">
      <rect width="180" height="60" fill="#32302f" stroke="#b8bb26" stroke-width="2" rx="5" />
      <text x="90" y="25" font-family="Courier New" font-size="20" fill="#b8bb26" text-anchor="middle">a r i o s</text>
      <text x="90" y="45" font-family="Arial" font-size="10" fill="#b8bb26" text-anchor="middle">Alta prob. (Diccionario)</text>
    </g>
  </g>

  <text x="40" y="365" font-family="Arial" font-size="12" fill="#a89984" font-style="italic">
    "Aunque la ventana sea pequeña, el modelo 'arrastra' el significado de los caracteres previos."
  </text>
</svg>