<svg width="900" height="920" viewBox="0 0 900 920" xmlns="http://www.w3.org/2000/svg">
  <rect x="2" y="2" width="896" height="916" rx="15" fill="#282828" stroke="#665c54" stroke-width="3" />
  
  <text x="60" y="40" font-family="Courier New, monospace" font-size="20" fill="#ebdbb2" font-weight="bold">PASO 4: DECODIFICACIÓN TEMPORAL DE CARACTERES</text>
  <text x="60" y="65" font-family="Courier New, monospace" font-size="18" fill="#a89984">Connectionist temporal classification decoding - CTC</text>
  <g transform="translate(60, 110)">
    <text x="0" y="-15" font-family="Arial" font-size="14" fill="#a89984" font-weight="bold">1. ACTIVACIONES DE CARACTERÍSTICAS (RNN)</text>
    <rect width="650" height="200" fill="#3c3836" rx="2" stroke="#665c54" stroke-width="2" />
    
    <g stroke="#504945" stroke-width="1.5" stroke-dasharray="4,4">
      <line x1="50" y1="0" x2="50" y2="200" /> <line x1="100" y1="0" x2="100" y2="200" />
      <line x1="150" y1="0" x2="150" y2="200" /> <line x1="200" y1="0" x2="200" y2="200" />
      <line x1="250" y1="0" x2="250" y2="200" /> <line x1="300" y1="0" x2="300" y2="200" />
      <line x1="350" y1="0" x2="350" y2="200" /> <line x1="400" y1="0" x2="400" y2="200" />
      <line x1="450" y1="0" x2="450" y2="200" /> <line x1="500" y1="0" x2="500" y2="200" />
      <line x1="550" y1="0" x2="550" y2="200" /> <line x1="600" y1="0" x2="600" y2="200" />
    </g>

    <g transform="translate(0, 20)">
      <path d="M0 40 L25 40 L35 12 L45 40 L85 40 L95 18 L105 40 L135 40 L145 10 L155 40 L200 40 L215 14 L225 40 L260 40 L285 12 L295 40 L345 40 L370 16 L380 40 L405 40 L415 12 L425 40 L475 40 L505 14 L515 40 L545 40 L555 12 L565 40 L595 40 L605 16 L615 40 L650 40" fill="none" stroke="#458588" stroke-width="2.5" />
      <path d="M0 90 L55 90 Q75 62 95 90 Q110 118 130 90 L150 90 Q170 68 190 90 L205 90 Q225 58 245 90 Q265 120 285 90 L305 90 Q325 68 345 90 L365 90 Q380 102 395 90 L415 90 Q445 58 475 90 Q495 116 515 90 L540 90 Q560 62 585 90 Q605 108 625 90 L650 90" fill="none" stroke="#cc241d" stroke-width="2.5" />
      <path d="M0 130 L20 130 L35 160 L60 160 L70 130 L85 130 L95 160 L120 160 L135 130 L150 130 L165 160 L190 160 L205 130 L220 130 L235 160 L265 160 L280 130 L305 130 L320 130 L335 130 L350 130 L365 130 L380 160 L405 160 L420 130 L440 130 L455 160 L480 160 L495 130 L515 130 L530 160 L555 160 L570 130 L590 130 L605 160 L650 160" fill="none" stroke="#98971a" stroke-width="3" />
    </g>

    <line x1="0" y1="0" x2="0" y2="200" stroke="#fabd2f" stroke-width="3" opacity="0.8">
      <animate attributeName="x1" values="0;650;0" dur="20s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0;650;0" dur="20s" repeatCount="indefinite" />
    </line>
  </g>

  <g transform="translate(60, 370)">
    <text x="0" y="-15" font-family="Arial" font-size="14" fill="#a89984" font-weight="bold">2. MATRIZ DE PROBABILIDADES (CANDIDATOS POR SEGMENTO)</text>
    <rect width="650" height="150" fill="#32302f" rx="5" stroke="#665c54" stroke-width="2" />
    
    <g stroke="#504945" stroke-width="1">
      <line x1="50" y1="0" x2="50" y2="150" /> <line x1="100" y1="0" x2="100" y2="150" />
      <line x1="150" y1="0" x2="150" y2="150" /> <line x1="200" y1="0" x2="200" y2="150" />
      <line x1="250" y1="0" x2="250" y2="150" /> <line x1="300" y1="0" x2="300" y2="150" />
      <line x1="350" y1="0" x2="350" y2="150" /> <line x1="400" y1="0" x2="400" y2="150" />
      <line x1="450" y1="0" x2="450" y2="150" /> <line x1="500" y1="0" x2="500" y2="150" />
      <line x1="550" y1="0" x2="550" y2="150" /> <line x1="600" y1="0" x2="600" y2="150" />
    </g>
    
    <g font-family="Courier New" font-size="20" font-weight="bold" text-anchor="middle">
      <text x="25" y="40" fill="#ebdbb2">f</text><text x="25" y="80" fill="#d3869b" opacity="0.5">f</text><text x="25" y="120" fill="#a89984" opacity="0.3">p</text>
      <text x="75" y="40" fill="#ebdbb2">a</text><text x="75" y="80" fill="#d3869b" opacity="0.5">o</text><text x="75" y="120" fill="#a89984" opacity="0.3">e</text>
      <text x="125" y="40" fill="#ebdbb2">z</text><text x="125" y="80" fill="#d3869b" opacity="0.5">s</text><text x="125" y="120" fill="#a89984" opacity="0.3">x</text>
      <text x="175" y="40" fill="#ebdbb2">e</text><text x="175" y="80" fill="#d3869b" opacity="0.5">e</text><text x="175" y="120" fill="#a89984" opacity="0.3">c</text>
      <text x="225" y="40" fill="#ebdbb2">r</text><text x="225" y="80" fill="#d3869b" opacity="0.5">r</text><text x="225" y="120" fill="#a89984" opacity="0.3">n</text>
      
      <text x="275" y="40" fill="#98971a">_</text><text x="275" y="80" fill="#98971a" opacity="0.5">_</text><text x="275" y="120" fill="#a89984" opacity="0.3">.</text>
      
      <text x="325" y="40" fill="#ebdbb2">u</text><text x="325" y="80" fill="#d3869b" opacity="0.5">v</text><text x="325" y="120" fill="#a89984" opacity="0.3">w</text>
      <text x="375" y="40" fill="#ebdbb2">n</text><text x="375" y="80" fill="#d3869b" opacity="0.5">m</text><text x="375" y="120" fill="#a89984" opacity="0.3">h</text>
      
      <text x="425" y="40" fill="#fb4934">a</text><text x="425" y="80" fill="#98971a" opacity="0.6">_</text><text x="425" y="120" fill="#a89984" opacity="0.3">o</text>
      
      <text x="475" y="40" fill="#fb4934">r</text><text x="475" y="80" fill="#ebdbb2" opacity="0.6">ñ</text><text x="475" y="120" fill="#a89984" opacity="0.3">n</text>
      
      <text x="525" y="40" fill="#fb4934">i</text><text x="525" y="80" fill="#ebdbb2" opacity="0.6">o</text><text x="525" y="120" fill="#a89984" opacity="0.3">l</text>
      
      <text x="575" y="40" fill="#ebdbb2">o</text><text x="575" y="80" fill="#d3869b" opacity="0.5">e</text><text x="575" y="120" fill="#a89984" opacity="0.3">a</text>
      <text x="625" y="40" fill="#ebdbb2">s</text><text x="625" y="80" fill="#d3869b" opacity="0.5">s</text><text x="625" y="120" fill="#a89984" opacity="0.3">z</text>
    </g>
  </g>

  <g transform="translate(60, 575)">
    <text x="0" y="-15" font-family="Arial" font-size="14" fill="#a89984" font-weight="bold">3. RUTAS DE HIPÓTESIS Y DECODIFICACIÓN</text>
    <rect width="650" height="180" fill="#32302f" rx="5" />
    
    <text x="670" y="45" font-family="Arial" font-size="14" fill="#ebdbb2" font-weight="bold">Ruta A (GT)</text>
    <text x="670" y="100" font-family="Arial" font-size="14" fill="#fb4934" font-weight="bold">Ruta B (HTR)</text>
    <text x="670" y="155" font-family="Arial" font-size="14" fill="#a89984" font-weight="bold" opacity="0.6">Ruta C (Alt)</text>

    <g font-family="Courier New" font-size="24" font-weight="bold" fill="#ebdbb2" text-anchor="middle">
      <text x="25" y="45">f</text> <text x="75" y="45">a</text> <text x="125" y="45">z</text> <text x="175" y="45">e</text> <text x="225" y="45">r</text> <text x="275" y="45" fill="#98971a">_</text> <text x="325" y="45">u</text> <text x="375" y="45">n</text> <text x="425" y="45" fill="#98971a">_</text> <text x="475" y="45">a</text> <text x="525" y="45">ñ</text> <text x="575" y="45">o</text> <text x="625" y="45">s</text>
    </g>

    <g font-family="Courier New" font-size="24" font-weight="bold" fill="#fb4934" text-anchor="middle">
      <text x="25" y="100" fill="#ebdbb2">f</text> <text x="75" y="100" fill="#ebdbb2">a</text> <text x="125" y="100" fill="#ebdbb2">z</text> <text x="175" y="100" fill="#ebdbb2">e</text> <text x="225" y="100" fill="#ebdbb2">r</text> <text x="275" y="100" fill="#98971a">_</text> <text x="325" y="100" fill="#ebdbb2">u</text> <text x="375" y="100" fill="#ebdbb2">n</text> <text x="425" y="100">a</text> <text x="475" y="100">r</text> <text x="525" y="100">i</text> <text x="575" y="100" fill="#ebdbb2">o</text> <text x="625" y="100" fill="#ebdbb2">s</text>
    </g>

    <g font-family="Courier New" font-size="24" font-weight="bold" fill="#d3869b" text-anchor="middle" opacity="0.6">
      <text x="25" y="155">f</text> <text x="75" y="155">o</text> <text x="125" y="155">s</text> <text x="175" y="155">e</text> <text x="225" y="155">r</text> <text x="275" y="155">_</text> <text x="325" y="155">v</text> <text x="375" y="155">m</text> <text x="425" y="155">a</text> <text x="475" y="155">r</text> <text x="525" y="155">o</text> <text x="575" y="155">e</text> <text x="625" y="155">s</text>
    </g>
  </g>

  <g transform="translate(60, 800)">
    <text x="0" y="-15" font-family="Arial" font-size="14" fill="#a89984" font-weight="bold">4. OUTPUT DEL MODELO HTR</text>
    <rect width="650" height="80" fill="#32302f" rx="10" stroke="#b8bb26" stroke-width="2" />
    <text x="670" y="45" font-family="Arial" font-size="14" fill="#b8bb26" font-weight="bold">Output HTR</text>
    
    <g font-family="Courier New" font-size="30" font-weight="bold" fill="#ebdbb2" text-anchor="middle">
      <text x="25" y="50">f</text> <text x="75" y="50">a</text> <text x="125" y="50">z</text> <text x="175" y="50">e</text> <text x="225" y="50">r</text> <text x="275" y="50" fill="#98971a">_</text> <text x="325" y="50">u</text> <text x="375" y="50">n</text> <text x="425" y="50" fill="#fb4934">a</text> <text x="475" y="50" fill="#fb4934">r</text> <text x="525" y="50" fill="#fb4934">i</text> <text x="575" y="50">o</text> <text x="625" y="50">s</text>
    </g>
  </g>
</svg>